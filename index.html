<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familia Bet - Sistema</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script>
        localStorage.setItem('cuidado_authenticated', 'true');
        localStorage.setItem('familiabet_login_time', Date.now().toString());
    </script>
    <link rel="stylesheet" crossorigin href="./assets/index-atQao4Jh.css">
    <style>
        #root-loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        #root-loading.hidden { opacity: 0; pointer-events: none; }
        #root-loading img { width: 100px; height: 100px; margin-bottom: 20px; animation: pulse 1.5s ease-in-out infinite; }
        #root-loading p { color: white; font-size: 18px; font-weight: 600; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 15px; }
        @keyframes spin { to { transform: rotate(360deg)); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div id="root-loading">
        <img src="assets/brasao-web.png" alt="Familia Bet">
        <p>Carregando Sistema...</p>
        <div class="loading-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" crossorigin src="./assets/index-8QbyIBO3.js"></script>
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loading = document.getElementById('root-loading');
                if (loading) { loading.classList.add('hidden'); setTimeout(function() { loading.style.display = 'none'; }, 500); }
            }, 1500);
        });
        function logout() {
            localStorage.removeItem('cuidado_authenticated');
            localStorage.removeItem('familiabet_login_time');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
