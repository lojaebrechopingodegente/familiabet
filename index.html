<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Família Bet</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }
    .hero-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      text-align: center;
    }
    .brasao-wrapper {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      box-shadow: 0 0 40px rgba(255,255,255,0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .brasao-wrapper:hover {
      transform: scale(1.05);
      box-shadow: 0 0 60px rgba(255,255,255,0.1);
    }
    .brasao-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }
    .titulo {
      font-size: 2.5rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: 0.05em;
    }
    .subtitulo {
      font-size: 1rem;
      color: #94a3b8;
      max-width: 400px;
      line-height: 1.6;
    }
    .btn-entrar {
      margin-top: 1rem;
      padding: 0.875rem 2.5rem;
      border-radius: 12px;
      border: none;
      background: #0d9488;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-entrar:hover {
      background: #0f766e;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(13,148,136,0.3);
    }
    .footer {
      position: fixed;
      bottom: 1rem;
      font-size: 0.75rem;
      color: #475569;
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="hero-container">
    <div class="brasao-wrapper">
      <img src="brasao-web.png" alt="Brasão Família Bet" />
    </div>
    <h1 class="titulo">Família Bet</h1>
    <p class="subtitulo">Sistema de Controle Familiar<br>Visita, Compras e Retiradas</p>
    <a href="/familiabet/" class="btn-entrar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Acessar Sistema
    </a>
  </div>
  <div class="footer">© Família Bet — Todos os direitos reservados</div>
</body>
</html>
