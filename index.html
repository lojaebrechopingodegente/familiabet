<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Família Bet</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }
    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
    .brasao-wrapper {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      box-shadow: 0 0 40px rgba(255,255,255,0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .brasao-wrapper:hover {
      transform: scale(1.05);
      box-shadow: 0 0 60px rgba(255,255,255,0.1);
    }
    .brasao-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }
    .titulo {
      font-size: 2rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: 0.05em;
    }
    .subtitulo {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.5;
    }
    .form-login {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .input-group {
      position: relative;
      width: 100%;
    }
    .input-group input {
      width: 100%;
      padding: 0.875rem 1rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #f8fafc;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s ease;
      text-align: center;
      letter-spacing: 0.15em;
    }
    .input-group input::placeholder {
      color: #64748b;
      letter-spacing: normal;
    }
    .input-group input:focus {
      border-color: #0d9488;
      box-shadow: 0 0 0 3px rgba(13,148,136,0.2);
    }
    .input-group input.erro {
      border-color: #ef4444;
      animation: shake 0.5s ease-in-out;
    }
    .btn-entrar {
      padding: 0.875rem 2.5rem;
      border-radius: 12px;
      border: none;
      background: #0d9488;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-entrar:hover {
      background: #0f766e;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(13,148,136,0.3);
    }
    .btn-entrar:active {
      transform: translateY(0);
    }
    .erro-msg {
      color: #ef4444;
      font-size: 0.85rem;
      min-height: 1.2rem;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .erro-msg.visible {
      opacity: 1;
    }
    .footer {
      position: fixed;
      bottom: 1rem;
      font-size: 0.75rem;
      color: #475569;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
      20%, 40%, 60%, 80% { transform: translateX(6px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-container {
      animation: fadeIn 0.5s ease-out;
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="login-container">
    <div class="brasao-wrapper">
      <img src="brasao-web.png" alt="Brasão Família Bet" />
    </div>
    <h1 class="titulo">Família Bet</h1>
    <p class="subtitulo">Sistema de Controle Familiar<br>Visita, Compras e Retiradas</p>

    <form class="form-login" id="formLogin" onsubmit="return validarSenha(event)">
      <div class="input-group">
        <input 
          type="password" 
          id="senha" 
          placeholder="Digite a senha" 
          autocomplete="off"
          maxlength="20"
        />
      </div>
      <p class="erro-msg" id="erroMsg">Senha incorreta. Tente novamente.</p>
      <button type="submit" class="btn-entrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Acessar Sistema
      </button>
    </form>
  </div>

  <div class="footer">© Família Bet — Todos os direitos reservados</div>

  <script>
    const SENHA_CORRETA = 'familiabet2026';

    function validarSenha(event) {
      event.preventDefault();

      const input = document.getElementById('senha');
      const erroMsg = document.getElementById('erroMsg');
      const senhaDigitada = input.value.trim();

      if (senhaDigitada === SENHA_CORRETA) {
        sessionStorage.setItem('familiabet_auth', 'true');
        // Redireciona para o app React na pasta assets
        window.location.href = './assets/index.html';
      } else {
        input.classList.add('erro');
        erroMsg.classList.add('visible');
        input.value = '';
        input.focus();

        setTimeout(() => {
          input.classList.remove('erro');
        }, 500);
      }

      return false;
    }

    document.getElementById('senha').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        validarSenha(e);
      }
    });

    document.getElementById('senha').addEventListener('input', function() {
      document.getElementById('erroMsg').classList.remove('visible');
    });
  </script>
</body>
</html>
