    <!-- Seu app React original -->
    <script type="module" crossorigin src="./assets/index-CzAGHX7V.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CzAGHX7V.css">

    <style>
        /* Estilos mínimos para loading */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #root-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #root-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #root-loading img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        #root-loading p {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Tela de loading inicial -->
    <div id="root-loading">
        <img src="brasao.png" alt="Família Bet">
        <p>Carregando Sistema...</p>
        <div class="loading-spinner"></div>
    </div>

    <!-- Root do React -->
    <div id="root"></div>

    <script>
        // Esconder loading quando o React carregar
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loading = document.getElementById('root-loading');
                if (loading) {
                    loading.classList.add('hidden');
                    setTimeout(function() {
                        loading.style.display = 'none';
                    }, 500);
                }
            }, 1500);
        });

        // Botão de logout (adicione no seu app React se quiser)
        function logout() {
            localStorage.removeItem('cuidado_authenticated');
            localStorage.removeItem('familiabet_login_time');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
